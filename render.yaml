# Render Blueprint — API backend độc lập cho Netlify frontend
# Kết nối repo GitHub → Render tự đọc file này → deploy server/
# Sau khi live, lấy URL (vd https://tinhoc24h-api.onrender.com) rồi cập nhật netlify.toml

services:
  - type: web
    name: tinhoc24h-api
    runtime: node
    rootDir: server
    plan: free
    # prisma db push: đồng bộ schema với PostgreSQL mà không cần migration SQLite cũ
    buildCommand: npm install && npx prisma generate && npx prisma db push && node prisma/seed.js
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PROVIDER
        value: postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: tinhoc24h-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      # Cloudinary — điền vào Render Dashboard > Environment sau khi đăng ký tại cloudinary.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Server không tự serve frontend (Netlify lo giao diện)
      - key: SERVE_FRONTEND
        value: "false"
      # Cho phép domain Netlify gọi API (đổi nếu domain Netlify khác)
      - key: CORS_ORIGIN
        value: https://tinhoc24h.netlify.app
      - key: SITE_URL
        value: https://tinhoc24h.netlify.app

databases:
  - name: tinhoc24h-db
    databaseName: tinhoc24h
    plan: free
