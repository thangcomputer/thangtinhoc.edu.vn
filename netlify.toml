# Deploy frontend (client + admin) tu GitHub len Netlify
# Backend Express chay rieng tren VPS — Netlify chi host file tinh trong site_dist

[build]
  command = "npm install --prefix client && npm install --prefix admin && npm run build:merged"
  publish = "site_dist"

[build.environment]
  NODE_VERSION = "20"
  # Goi API cung domain qua proxy ben duoi (khong can CORS)
  VITE_API_URL = "/api"

# --- Proxy API/uploads ve backend RIENG tren Render (doc lap voi VPS cu) ---
# Doi URL ben duoi neu Render cap domain khac tinhoc24h-api.onrender.com

[[redirects]]
  from = "/api/*"
  to = "https://tinhoc24h-api.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://tinhoc24h-api.onrender.com/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap.xml"
  to = "https://tinhoc24h-api.onrender.com/sitemap.xml"
  status = 200
  force = true

[[redirects]]
  from = "/robots.txt"
  to = "https://tinhoc24h-api.onrender.com/robots.txt"
  status = 200
  force = true

# --- SPA routing (client + admin) ---
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
