# Deploy frontend (client + admin) tu GitHub len Netlify
# Backend Express chay rieng tren VPS — Netlify chi host file tinh trong site_dist

[build]
  command = "npm install --prefix client && npm install --prefix admin && npm run build:merged"
  publish = "site_dist"

[build.environment]
  NODE_VERSION = "20"
  # Goi API cung domain qua proxy ben duoi (khong can CORS)
  VITE_API_URL = "/api"

# --- Proxy API/uploads ve backend VPS dang chay (thangtinhoc.edu.vn) ---
# Netlify proxy phia server nen trinh duyet thay cung domain -> khong dinh CORS

[[redirects]]
  from = "/api/*"
  to = "https://thangtinhoc.edu.vn/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://thangtinhoc.edu.vn/uploads/:splat"
  status = 200
  force = true

# --- SPA routing (client + admin) ---
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
