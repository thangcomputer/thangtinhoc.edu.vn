<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)" />

  <!-- Monitor body -->
  <rect x="42" y="58" width="116" height="76" rx="8" ry="8" fill="white" opacity="0.95" />
  <!-- Monitor screen -->
  <rect x="50" y="66" width="100" height="58" rx="4" ry="4" fill="url(#screenGrad)" />
  <!-- Monitor stand -->
  <rect x="85" y="134" width="30" height="8" rx="2" fill="white" opacity="0.8" />
  <rect x="72" y="141" width="56" height="5" rx="2.5" fill="white" opacity="0.7" />

  <!-- Code lines on screen -->
  <rect x="58" y="76" width="36" height="4" rx="2" fill="white" opacity="0.9" />
  <rect x="58" y="84" width="52" height="4" rx="2" fill="white" opacity="0.7" />
  <rect x="58" y="92" width="28" height="4" rx="2" fill="white" opacity="0.8" />
  <rect x="58" y="100" width="44" height="4" rx="2" fill="white" opacity="0.6" />
  <rect x="58" y="108" width="34" height="4" rx="2" fill="white" opacity="0.75" />

  <!-- Graduation cap on top-right of screen -->
  <g transform="translate(118, 56)">
    <!-- Cap board -->
    <polygon points="0,-10 14,0 0,4 -14,0" fill="white" opacity="0.95" />
    <!-- Cap top -->
    <rect x="-3" y="-10" width="6" height="8" rx="1" fill="white" opacity="0.85" />
    <!-- Tassel -->
    <line x1="14" y1="0" x2="14" y2="10" stroke="white" stroke-width="1.5" opacity="0.8" />
    <circle cx="14" cy="11" r="2" fill="white" opacity="0.8" />
  </g>
</svg>
