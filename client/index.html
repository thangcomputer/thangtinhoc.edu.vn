<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Tin học 24h - Trung tâm đào tạo tin học văn phòng chuyên nghiệp. Khóa học Excel, Word, PowerPoint, AI ứng dụng. Luyện thi chứng chỉ MOS, IC3." />
    <meta name="keywords" content="tin học văn phòng, khóa học excel, học word, powerpoint, MOS, IC3, AI, đào tạo tin học" />
    <meta name="author" content="Tin học 24h" />
    <meta property="og:title" content="Tin học 24h - Trung Tâm Đào Tạo Tin Học" />
    <meta property="og:description" content="Khóa học tin học văn phòng chuyên nghiệp. Excel, Word, PowerPoint, AI ứng dụng." />
    <meta property="og:type" content="website" />
    <meta name="robots" content="index, follow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Tin học 24h - Trung Tâm Đào Tạo Tin Học</title>

    <!-- Schema.org: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "Tin học 24h",
      "alternateName": "Trung Tâm Đào Tạo Tin Học 24h",
      "url": "https://thangtinhoc.com",
      "logo": "https://thangtinhoc.com/logo.png",
      "description": "Trung tâm đào tạo tin học văn phòng chuyên nghiệp. Khóa học Excel, Word, PowerPoint, AI ứng dụng.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Việt Nam",
        "addressCountry": "VN"
      },
      "sameAs": [
        "https://facebook.com/thangtinhoc",
        "https://youtube.com/@thangtinhoc",
        "https://zalo.me/thangtinhoc"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": "Vietnamese"
      }
    }
    </script>

    <!-- Schema.org: WebSite + Sitelinks Search Box -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Tin học 24h",
      "url": "https://thangtinhoc.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://thangtinhoc.com/courses?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Schema.org: SiteNavigationElement (Sitelinks) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SiteNavigationElement",
          "name": "Khóa Học Tin Học",
          "description": "Tất cả khóa học tin học văn phòng Excel, Word, PowerPoint, AI ứng dụng",
          "url": "https://thangtinhoc.com/courses"
        },
        {
          "@type": "SiteNavigationElement",
          "name": "Giới Thiệu",
          "description": "Tìm hiểu về Trung Tâm Đào Tạo Tin Học 24h",
          "url": "https://thangtinhoc.com/gioi-thieu"
        },
        {
          "@type": "SiteNavigationElement",
          "name": "Blog Tin Học",
          "description": "Bài viết hướng dẫn, mẹo tin học văn phòng và công nghệ",
          "url": "https://thangtinhoc.com/blog"
        },
        {
          "@type": "SiteNavigationElement",
          "name": "Liên Hệ Tư Vấn",
          "description": "Liên hệ tư vấn khóa học, đăng ký học tin học",
          "url": "https://thangtinhoc.com/lien-he"
        },
        {
          "@type": "SiteNavigationElement",
          "name": "Tuyển Dụng Giáo Viên",
          "description": "Cơ hội việc làm giảng viên tin học tại Tin học 24h",
          "url": "https://thangtinhoc.com/tuyen-dung"
        },
        {
          "@type": "SiteNavigationElement",
          "name": "Đăng Ký Học",
          "description": "Ghi danh khóa học tin học văn phòng ngay hôm nay",
          "url": "https://thangtinhoc.com/?enroll=true"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
