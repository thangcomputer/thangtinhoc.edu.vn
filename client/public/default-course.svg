<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a" />
      <stop offset="60%" style="stop-color:#2563eb" />
      <stop offset="100%" style="stop-color:#4f46e5" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bfdbfe" />
      <stop offset="100%" style="stop-color:#93c5fd" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Subtle dot grid pattern -->
  <g opacity="0.08">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="white" />
    </pattern>
    <rect width="800" height="450" fill="url(#dots)" />
  </g>

  <!-- Decorative circles -->
  <circle cx="680" cy="80" r="120" fill="white" opacity="0.04" />
  <circle cx="680" cy="80" r="80" fill="white" opacity="0.04" />
  <circle cx="120" cy="370" r="100" fill="white" opacity="0.04" />

  <!-- Main card / monitor illustration -->
  <g transform="translate(200, 80)">
    <!-- Monitor outer -->
    <rect x="0" y="0" width="300" height="195" rx="12" ry="12" fill="url(#cardGrad)" stroke="white" stroke-opacity="0.25" stroke-width="1.5" />
    <!-- Monitor screen -->
    <rect x="12" y="12" width="276" height="161" rx="6" ry="6" fill="url(#screenGrad)" opacity="0.9" />
    <!-- Stand -->
    <rect x="125" y="195" width="50" height="14" rx="3" fill="white" opacity="0.2" />
    <rect x="105" y="208" width="90" height="8" rx="4" fill="white" opacity="0.15" />

    <!-- Code lines on screen -->
    <rect x="24" y="26" width="80" height="6" rx="3" fill="#1e3a8a" opacity="0.6" />
    <rect x="24" y="38" width="120" height="6" rx="3" fill="#1e40af" opacity="0.5" />
    <rect x="24" y="50" width="60" height="6" rx="3" fill="#2563eb" opacity="0.6" />
    <rect x="24" y="62" width="100" height="6" rx="3" fill="#1e3a8a" opacity="0.45" />
    <rect x="24" y="74" width="70" height="6" rx="3" fill="#1e40af" opacity="0.5" />
    <!-- Graph bars on right side of screen -->
    <rect x="160" y="100" width="24" height="60" rx="3" fill="#1e40af" opacity="0.7" />
    <rect x="192" y="76" width="24" height="84" rx="3" fill="#1d4ed8" opacity="0.8" />
    <rect x="224" y="118" width="24" height="42" rx="3" fill="#1e40af" opacity="0.65" />
    <!-- Cursor blink on screen -->
    <rect x="24" y="90" width="8" height="10" rx="1" fill="#2563eb" opacity="0.9" />
  </g>

  <!-- Book icon on left -->
  <g transform="translate(80, 150)">
    <rect x="0" y="0" width="68" height="86" rx="5" fill="white" opacity="0.15" stroke="white" stroke-opacity="0.3" stroke-width="1.5" />
    <rect x="8" y="10" width="52" height="5" rx="2.5" fill="white" opacity="0.6" />
    <rect x="8" y="22" width="40" height="5" rx="2.5" fill="white" opacity="0.5" />
    <rect x="8" y="34" width="48" height="5" rx="2.5" fill="white" opacity="0.55" />
    <rect x="8" y="46" width="32" height="5" rx="2.5" fill="white" opacity="0.45" />
    <line x1="34" y1="0" x2="34" y2="86" stroke="white" stroke-opacity="0.2" stroke-width="1.5" />
  </g>

  <!-- Graduation cap icon -->
  <g transform="translate(640, 160)">
    <polygon points="40,0 80,18 40,30 0,18" fill="white" opacity="0.2" />
    <rect x="30" y="-28" width="20" height="28" rx="2" fill="white" opacity="0.15" />
    <line x1="80" y1="18" x2="80" y2="50" stroke="white" stroke-opacity="0.3" stroke-width="2" />
    <circle cx="80" cy="55" r="6" fill="white" opacity="0.3" />
  </g>

  <!-- Site name text -->
  <text x="400" y="348" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="white" text-anchor="middle" letter-spacing="2" opacity="0.95">TH®NG TIN HĚC</text>

  <!-- Tagline -->
  <text x="400" y="382" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" opacity="0.7" letter-spacing="1">Trung Tâm ŕo Tˇo Tin HÍc</text>

  <!-- Divider line -->
  <line x1="280" y1="360" x2="520" y2="360" stroke="white" stroke-opacity="0.2" stroke-width="1" />
</svg>
